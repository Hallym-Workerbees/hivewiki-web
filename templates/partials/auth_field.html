<label class="block">
    <span class="mb-2 block text-sm font-semibold">{{ field.label }}</span>
    {{ field }}
    {% if field.help_text %}<p class="mt-2 text-xs text-stone-500">{{ field.help_text }}</p>{% endif %}
    {% for error in field.errors %}<p class="mt-2 text-sm text-red-700">{{ error }}</p>{% endfor %}
</label>
