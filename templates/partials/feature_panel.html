<section class="overflow-hidden rounded-[2rem] bg-stone-950 px-8 py-9 text-stone-100">
    <div class="max-w-2xl">
        {% if eyebrow %}<div class="text-xs uppercase tracking-[0.28em] text-stone-400">{{ eyebrow }}</div>{% endif %}
        <h2 class="mt-3 font-headline text-4xl font-black tracking-tight">{{ title }}</h2>
        <p class="mt-4 text-sm leading-8 text-stone-300">{{ description }}</p>
    </div>
    {% if cta_href and cta_label %}
        <div class="mt-8">
            <a href="{{ cta_href }}"
               class="inline-flex rounded-2xl bg-primary-container px-5 py-3 text-sm font-bold text-on-primary-container">{{ cta_label }}</a>
        </div>
    {% endif %}
</section>
