{% if messages %}
    <div class="flash-stack pointer-events-none fixed inset-x-0 top-24 z-50 flex justify-center px-4">
        <div class="w-full max-w-xl space-y-2">
            {% for message in messages %}
                <div class="flash-message pointer-events-auto rounded-2xl bg-surface-container-lowest px-4 py-3 text-sm shadow-ambient">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    </div>
{% endif %}
