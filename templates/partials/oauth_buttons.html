{% if oauth_providers %}
    <div class="mt-6 space-y-3">
        <div class="text-xs font-semibold uppercase tracking-[0.24em] text-stone-400">Social Login</div>
        <div class="grid gap-3">
            {% for oauth_provider in oauth_providers %}
                <a href="{{ oauth_provider.start_url }}"
                   class="flex items-center justify-center rounded-2xl border border-stone-200 bg-white px-4 py-3 text-sm font-semibold text-on-surface transition hover:bg-surface-container-high">
                    {{ oauth_provider.label }}로 계속하기
                </a>
            {% endfor %}
        </div>
    </div>
{% endif %}
