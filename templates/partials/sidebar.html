<aside class="fixed inset-y-0 left-0 hidden w-72 border-r border-stone-200/60 bg-surface-container-low px-5 py-8 lg:block">
    <a href="{% url 'dashboard' %}"
       class="mb-10 flex items-center gap-3 px-3">
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-primary-container text-lg font-black text-on-primary-container">
            H
        </div>
        <div>
            <div class="font-headline text-2xl font-extrabold tracking-tight">HiveWiki</div>
            <div class="text-xs uppercase tracking-[0.24em] text-stone-500">Workspace</div>
        </div>
    </a>
    <nav class="space-y-2 text-sm">
        <a href="{% url 'dashboard' %}"
           class="block rounded-2xl bg-surface-container-high px-4 py-3 font-bold text-primary">홈</a>
        <a href="{% url 'community_list' %}"
           class="block rounded-2xl px-4 py-3 text-on-surface-variant transition hover:bg-surface-container-high">커뮤니티</a>
        <a href="{% url 'wiki_home' %}"
           class="block rounded-2xl px-4 py-3 text-on-surface-variant transition hover:bg-surface-container-high">위키</a>
        <a href="{% url 'integrated_search' %}"
           class="block rounded-2xl px-4 py-3 text-on-surface-variant transition hover:bg-surface-container-high">통합 검색</a>
        <a href="{% url 'mypage' %}"
           class="block rounded-2xl px-4 py-3 text-on-surface-variant transition hover:bg-surface-container-high">마이페이지</a>
    </nav>
    <div class="mt-10 rounded-[1.75rem] bg-stone-950 px-5 py-6 text-stone-100">
        {% if current_user %}
            <div class="text-xs uppercase tracking-[0.28em] text-stone-400">Signed in</div>
            <h2 class="mt-3 font-headline text-2xl font-extrabold tracking-tight">{{ current_user.username }}</h2>
            <p class="mt-3 text-sm leading-7 text-stone-300">{{ current_user.email }}</p>
            <div class="mt-5 flex flex-wrap gap-3">
                <a href="{% url 'mypage' %}"
                   class="rounded-2xl bg-white/10 px-4 py-3 text-sm font-semibold text-white">내 정보</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit"
                            class="rounded-2xl bg-primary-container px-4 py-3 text-sm font-bold text-on-primary-container">
                        로그아웃
                    </button>
                </form>
            </div>
        {% else %}
            <div class="text-xs uppercase tracking-[0.28em] text-stone-400">Foundation</div>
            <h2 class="mt-3 font-headline text-2xl font-extrabold tracking-tight">Shared UI Kit</h2>
            <p class="mt-3 text-sm leading-7 text-stone-300">검색 바, 카드, 비주얼 섹션, 요약 블록을 공통 partial로 먼저 고정했습니다.</p>
        {% endif %}
    </div>
</aside>
